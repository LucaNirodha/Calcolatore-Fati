<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcolatore Danni</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background: #202020;
    /* Modificato per permettere lo scorrimento e la griglia al posto di centrare un singolo elemento */
    padding: 30px; 
}

/* --- NUOVI STILI PER LA STRUTTURA A GRIGLIA E I PULSANTI --- */
.header-controlli {
    text-align: center;
    margin-bottom: 30px;
}

#btn-aggiungi {
    padding: 12px 24px;
    font-size: 18px;
    background: #aed581;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 0 10px rgba(0,0,0,.3);
}

.griglia-calcolatori {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* Massimo 2 colonne */
    gap: 30px;
    max-width: 1600px;
    margin: 0 auto;
}

@media(max-width: 900px) {
    .griglia-calcolatori { grid-template-columns: 1fr; } /* Diventa a 1 colonna su schermi piccoli */
}

.blocco-calcolatore {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.header-player {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #2e2e2e;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 0 10px rgba(0,0,0,.5);
}

.nome-player {
    background: transparent;
    border: none;
    color: white;
    font-size: 24px;
    font-weight: bold;
    outline: none;
    width: 100%;
}

.nome-player::placeholder { color: #888; }

.btn-elimina {
    background: #d32f2f;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 16px;
}

/* --- STILI ORIGINALI (Adattati per le classi invece che per gli ID) --- */
.container {
    width: 100%; /* Adattato al 100% per riempire la sua colonna */
    background: #2e2e2e;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0,0,0,.5);
    overflow: hidden;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 2px solid #111;
    text-align: center;
    padding: 15px;
}

th { font-size: 28px; }

.attacco { background: #d32f2f; color: white; }
.resistenza { background: #fbc02d; color: black; }
.input { background: #aed581; }

.input-valore {
    width: 100%;
    background: transparent;
    border: none;
    text-align: center;
    font-size: 42px;
    font-weight: bold;
    outline: none;
}

.fascia {
    margin-top: 10px;
    font-size: 22px;
    font-weight: bold;
}

select {
    margin-top: 10px;
    font-size: 18px;
    padding: 6px;
    border-radius: 6px;
}

.dannoTitolo {
    background: #ffee58;
    color: black;
    font-size: 28px;
}

.danno {
    background: #b71c1c;
    color: white;
    font-size: 60px;
    font-weight: bold;
}

.bianca{color:white;} .gialla{color:#ffee58;} .arancione{color:orange;}
.rossa{color:#ff5252;} .viola{color:#ba68c8;} .nera{color:#9e9e9e;}
.bronzo{color:#b87333;} .argento{color:silver;} .oro{color:gold;}
.diamante{color:#64b5f6;}
</style>
</head>

<body>

<div class="header-controlli">
    <button id="btn-aggiungi">Aggiungi Calcolatore</button>
</div>

<div id="griglia" class="griglia-calcolatori">
    </div>

<script>
// --- LE TUE FUNZIONI ORIGINALI (Senza nessuna modifica logica) ---
function fascia(valore){
    if(valore<=29) return 1;
    if(valore<=59) return 2;
    if(valore<=89) return 3;
    if(valore<=119) return 4;
    if(valore<=149) return 5;
    if(valore==150) return 6;
    if(valore<=199) return 7;
    if(valore<=224) return 8;
    if(valore<=255) return 9;
    return 10;
}

function nomeFascia(f){
    switch(f){
        case 1:return "Bianca"; case 2:return "Gialla"; case 3:return "Arancione";
        case 4:return "Rossa"; case 5:return "Viola"; case 6:return "Nera";
        case 7:return "Bronzo"; case 8:return "Argento"; case 9:return "Oro";
        default:return "Diamante";
    }
}

function classeFascia(f){
    switch(f){
        case 1:return "bianca"; case 2:return "gialla"; case 3:return "arancione";
        case 4:return "rossa"; case 5:return "viola"; case 6:return "nera";
        case 7:return "bronzo"; case 8:return "argento"; case 9:return "oro";
        default:return "diamante";
    }
}

// --- GESTIONE DEI CALCOLATORI MULTIPLI ---
const griglia = document.getElementById("griglia");
const btnAggiungi = document.getElementById("btn-aggiungi");

// Questa funzione crea la struttura HTML del tuo calcolatore
function creaCalcolatore(isFisso = false) {
    const blocco = document.createElement("div");
    blocco.className = "blocco-calcolatore";
    
    // Se isFisso è true, non mostriamo il bottone "X"
    const bottoneElimina = isFisso ? '' : '<button class="btn-elimina">X</button>';

    blocco.innerHTML = `
        <div class="header-player">
            <input type="text" class="nome-player" placeholder="Nome Player...">
            ${bottoneElimina}
        </div>
        <div class="container">
            <table>
                <tr>
                    <th class="attacco">ATTACCO</th>
                    <th class="resistenza">RESISTENZA</th>
                </tr>
                <tr>
                    <td class="input">
                        <input class="input-valore campo-attacco" type="number" value="120" step="5">
                        <div class="fascia testo-fascia-attacco"></div>
                        <select class="malus-attacco">
                            <option value="0">0</option><option value="1">-1</option>
                            <option value="2">-2</option><option value="3">-3</option>
                        </select>
                    </td>
                    <td class="input">
                        <input class="input-valore campo-resistenza" type="number" value="90" step="5">
                        <div class="fascia testo-fascia-resistenza"></div>
                        <select class="malus-resistenza">
                            <option value="0">0</option><option value="1">-1</option>
                            <option value="2">-2</option><option value="3">-3</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td class="dannoTitolo">DANNO MASSIMO</td>
                    <td class="danno"><span class="valore-danno">0</span></td>
                </tr>
            </table>
        </div>
    `;

    // Seleziona gli elementi solo per QUESTO specifico calcolatore
    const attacco = blocco.querySelector(".campo-attacco");
    const resistenza = blocco.querySelector(".campo-resistenza");
    const malusAttacco = blocco.querySelector(".malus-attacco");
    const malusResistenza = blocco.querySelector(".malus-resistenza");
    
    const testoAttacco = blocco.querySelector(".testo-fascia-attacco");
    const testoResistenza = blocco.querySelector(".testo-fascia-resistenza");
    const spanDanno = blocco.querySelector(".valore-danno");

    // La tua funzione originale di calcolo, contestualizzata al blocco corrente
    function calcola() {
        const valoreAttacco = Number(attacco.value) || 0;
        const valoreResistenza = Number(resistenza.value) || 0;

        let fasciaAttacco = fascia(valoreAttacco);
        let fasciaResistenza = fascia(valoreResistenza);

        fasciaAttacco -= Number(malusAttacco.value);
        fasciaResistenza -= Number(malusResistenza.value);

        if(fasciaAttacco < 1) fasciaAttacco = 1;
        if(fasciaResistenza < 1) fasciaResistenza = 1;

        testoAttacco.textContent = nomeFascia(fasciaAttacco);
        testoResistenza.textContent = nomeFascia(fasciaResistenza);

        testoAttacco.className = "fascia " + classeFascia(fasciaAttacco);
        testoResistenza.className = "fascia " + classeFascia(fasciaResistenza);

        let differenza = fasciaAttacco - fasciaResistenza;

        if(differenza < 0) differenza = 0;

        spanDanno.textContent = differenza * 10;
    }

    // Aggiungo i listener al blocco corrente
    attacco.addEventListener("input", calcola);
    resistenza.addEventListener("input", calcola);
    malusAttacco.addEventListener("change", calcola);
    malusResistenza.addEventListener("change", calcola);

    // Se non è fisso, abilito il bottone per cancellarlo
    if (!isFisso) {
        blocco.querySelector(".btn-elimina").addEventListener("click", function() {
            blocco.remove();
        });
    }

    // Eseguo il calcolo iniziale e lo aggiungo alla griglia
    calcola();
    griglia.appendChild(blocco);
}

// Associa il tasto "Aggiungi" alla creazione di un calcolatore libero (cancellabile)
btnAggiungi.addEventListener("click", () => creaCalcolatore(false));

// INIZIALIZZAZIONE: Crea automaticamente i 2 calcolatori FISSI (non cancellabili) all'avvio
creaCalcolatore(true);
creaCalcolatore(true);

</script>
</body>
</html>
