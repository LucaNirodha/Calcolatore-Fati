<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calcolatore Danni Multiplo</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#202020;
    display:flex;
    flex-direction: column;
    align-items:center;
    min-height:100vh;
    padding: 30px 10px;
}

/* Area dei controlli principali */
.controlli {
    margin-bottom: 30px;
    text-align: center;
}

.btn-aggiungi {
    background: #4caf50;
    color: white;
    border: none;
    padding: 12px 24px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: background 0.2s, transform 0.1s;
}

.btn-aggiungi:hover {
    background: #43a047;
}

.btn-aggiungi:active {
    transform: scale(0.98);
}

/* Griglia per contenere tutti i calcolatori */
.griglia-calcolatori {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    width: 100%;
    max-width: 1600px;
}

/* Singola scheda del calcolatore */
.container{
    width: 480px;
    background:#2e2e2e;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,.5);
    overflow:hidden;
    display: flex;
    flex-direction: column;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:2px solid #111;
    text-align:center;
    padding:15px;
}

th{
    font-size:24px;
}

.attacco{
    background:#d32f2f;
    color:white;
}

.resistenza{
    background:#fbc02d;
    color:black;
}

.input{
    background:#aed581;
}

input{
    width:100%;
    background:transparent;
    border:none;
    text-align:center;
    font-size:36px;
    font-weight:bold;
    outline:none;
}

.fascia{
    margin-top:10px;
    font-size:20px;
    font-weight:bold;
}

select{
    margin-top:10px;
    font-size:16px;
    padding:6px;
    border-radius:6px;
}

.dannoTitolo{
    background:#ffee58;
    color:black;
    font-size:22px;
}

.danno{
    background:#b71c1c;
    color:white;
    font-size:48px;
    font-weight:bold;
}

/* Pulsante per eliminare il singolo calcolatore */
.btn-elimina {
    background: #e53935;
    color: white;
    border: none;
    padding: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s;
    border-top: 2px solid #111;
}

.btn-elimina:hover {
    background: #b71c1c;
}

/* Colori delle fasce */
.bianca{color:white;}
.gialla{color:#ffee58;}
.arancione{color:orange;}
.rossa{color:#ff5252;}
.viola{color:#ba68c8;}
.nera{color:#9e9e9e;}
.bronzo{color:#b87333;}
.argento{color:silver;}
.oro{color:gold;}
.diamante{color:#64b5f6;}

</style>

</head>

<body>

<div class="controlli">
    <button class="btn-aggiungi" id="aggiungiCalcolatore">＋ Aggiungi Calcolatore</button>
</div>

<div class="griglia-calcolatori" id="contenitoreCalcolatori"></div>

// Funzione per calcolare la fascia numerica
function fascia(valore){
    if(valore<=29) return 1;
    if(valore<=59) return 2;
    if(valore<=89) return 3;
    if(valore<=119) return 4;
    if(valore<=149) return 5;
    if(valore==150) return 6;
    if(valore<=199) return 7;
    if(valore<=224) return 8;
    if(valore<=255) return 9;
    return 10;
}

    switch(f){

        case 4:return "Rossa";
        case 5:return "Viola";
        case 6:return "Nera";
        case 7:return "Bronzo";
        case 8:return "Argento";
        case 9:return "Oro";

    }
}
