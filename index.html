<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calcolatore Danni</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#202020;
    display:flex;
    flex-direction: column;
    align-items:center;
    min-height:100vh;
    padding: 30px 10px;
}

/* Contenitore per allineare i calcolatori in modo ordinato */
.griglia {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    width: 100%;
    max-width: 1600px;
}

.container{
    width:720px;
    background:#2e2e2e;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,.5);
    overflow:hidden;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:2px solid #111;
    text-align:center;
    padding:15px;
}

th{
    font-size:28px;
}

.attacco{
    background:#d32f2f;
    color:white;
}

.resistenza{
    background:#fbc02d;
    color:black;
}

.input{
    background:#aed581;
}

input{
    width:100%;
    background:transparent;
    border:none;
    text-align:center;
    font-size:42px;
    font-weight:bold;
    outline:none;
}

.fascia{
    margin-top:10px;
    font-size:22px;
    font-weight:bold;
}

select{
    margin-top:10px;
    font-size:18px;
    padding:6px;
    border-radius:6px;
}

.dannoTitolo{
    background:#ffee58;
    color:black;
    font-size:28px;
}

.danno{
    background:#b71c1c;
    color:white;
    font-size:60px;
    font-weight:bold;
}

.bianca{color:white;}
.gialla{color:#ffee58;}
.arancione{color:orange;}
.rossa{color:#ff5252;}
.viola{color:#ba68c8;}
.nera{color:#9e9e9e;}
.bronzo{color:#b87333;}
.argento{color:silver;}
.oro{color:gold;}
.diamante{color:#64b5f6;}

/* --- NUOVI STILI AGGIUNTI PER IL PLAYER E I PULSANTI --- */

/* Barra superiore per i controlli */
.controlli {
    margin-bottom: 25px;
    text-align: center;
}

.btn-aggiungi {
    background: #4caf50;
    color: white;
    border: none;
    padding: 12px 24px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: background 0.2s, transform 0.1s;
}

.btn-aggiungi:hover {
    background: #43a047;
}

.btn-aggiungi:active {
    transform: scale(0.98);
}

/* Area del nome del giocatore in cima al calcolatore */
.player-header {
    background: #1a1a1a;
    padding: 10px;
    border-bottom: 2px solid #111;
}

.player-input {
    width: 100% !important;
    background: transparent !important;
    border: none !important;
    text-align: center !important;
    font-size: 22px !important; /* Sovrascrive il font-size generico di 42px degli input numerici */
    font-weight: bold !important;
    color: #ffffff !important;
    outline: none !important;
}

.player-input::placeholder {
    color: #757575;
    font-style: italic;
    font-weight: normal;
}

/* Riga per il pulsante di eliminazione calcolatore */
.riga-elimina td {
    background: #d32f2f;
    color: white;
    font-weight: bold;
    font-size: 18px;
    cursor: pointer;
    border-top: 2px solid #111;
    transition: background 0.2s;
}

.riga-elimina td:hover {
    background: #b71c1c;
}

</style>

</head>

<body>

<div class="controlli">
    <button class="btn-aggiungi" id="aggiungiCalcolatore">＋ Aggiungi Calcolatore</button>
</div>

<div class="griglia" id="grigliaCalcolatori"></div>

<script>
function fascia(valore){
    if(valore<=29) return 1;
    if(valore<=59) return 2;
    if(valore<=89) return 3;
    if(valore<=119) return 4;
    if(valore<=149) return 5;
    if(valore==150) return 6;
    if(valore<=199) return 7;
    if(valore<=224) return 8;
    if(valore<=255) return 9;
    return 10;
}

function nomeFascia(f){
    switch(f){
        case 1:return "Bianca";
        case 2:return "Gialla";
        case 3:return "Arancione";
        case 4:return "Rossa";
        case 5:return "Viola";
        case 6:return "Nera";
        case 7:return "Bronzo";
        case 8:return "Argento";
        case 9:return "Oro";
        default:return "Diamante";
    }
}

function classeFascia(f){
    switch(f){
        case 1:return "bianca";
        case 2:return "gialla";
        case 3:return "arancione";
        case 4:return "rossa";
        case 5:return "viola";
        case 6:return "nera";
        case 7:return "bronzo";
        case 8:return "argento";
        case 9:return "oro";
        default:return "diamante";
    }
}

// Funzione isolata di calcolo per la singola scheda
function calcola(scheda){
    const attacco = scheda.querySelector(".input-attacco");
    const resistenza = scheda.querySelector(".input-resistenza");
    const malusAttacco = scheda.querySelector(".malus-attacco");
    const malusResistenza = scheda.querySelector(".malus-resistenza");

    const valoreAttacco = Number(attacco.value) || 0;
    const valoreResistenza = Number(resistenza.value) || 0;

    let fasciaAttacco = fascia(valoreAttacco);
    let fasciaResistenza = fascia(valoreResistenza);

    fasciaAttacco -= Number(malusAttacco.value);
    fasciaResistenza -= Number(malusResistenza.value);

    if(fasciaAttacco < 1) fasciaAttacco = 1;
    if(fasciaResistenza < 1) fasciaResistenza = 1;

    const testoAttacco = scheda.querySelector(".fascia-attacco");
    const testoResistenza = scheda.querySelector(".fascia-resistenza");

    testoAttacco.textContent = nomeFascia(fasciaAttacco);
    testoResistenza.textContent = nomeFascia(fasciaResistenza);

    testoAttacco.className = "fascia " + classeFascia(fasciaAttacco);
    testoResistenza.className = "fascia " + classeFascia(fasciaResistenza);

    let differenza = fasciaAttacco - fasciaResistenza;

    if(differenza < 0)
        differenza = 0;

    scheda.querySelector(".valore-danno").textContent = differenza * 10;
}

// Generatore dinamico delle schede calcolatore
function creaCalcolatore(eliminabile) {
    const griglia = document.getElementById("grigliaCalcolatori");
    
    const scheda = document.createElement("div");
    scheda.className = "container";
    
    let htmlContent = `
        <table>
            <tr>
                <td colspan="2" class="player-header">
                    <input type="text" class="player-input" placeholder="Inserire nome player">
                </td>
            </tr>
            <tr>
                <th class="attacco">ATTACCO</th>
                <th class="resistenza">RESISTENZA</th>
            </tr>
            <tr>
                <td class="input">
                    <input class="input-attacco" type="number" value="120" step="5">
                    <div class="fascia fascia-attacco"></div>
                    <select class="malus-attacco">
                        <option value="0">0</option>
                        <option value="1">-1</option>
                        <option value="2">-2</option>
                        <option value="3">-3</option>
                    </select>
                </td>
                <td class="input">
                    <input class="input-resistenza" type="number" value="90" step="5">
                    <div class="fascia fascia-resistenza"></div>
                    <select class="malus-resistenza">
                        <option value="0">0</option>
                        <option value="1">-1</option>
                        <option value="2">-2</option>
                        <option value="3">-3</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td class="dannoTitolo">DANNO MASSIMO</td>
                <td class="danno">
                    <span class="valore-danno">0</span>
                </td>
            </tr>
    `;

    // Aggiunge la riga con il pulsante "Elimina" solo se la scheda è impostata come eliminabile
    if (eliminabile) {
        htmlContent += `
            <tr class="riga-elimina">
                <td colspan="2" class="btn-elimina">
                    ELIMINA CALCOLATORE
                </td>
            </tr>
        `;
    }

    htmlContent += `</table>`;
    scheda.innerHTML = htmlContent;

    // Collega gli eventi di ascolto direttamente agli input di questa singola scheda
    const inputsCalcolo = scheda.querySelectorAll(".input-attacco, .input-resistenza, .malus-attacco, .malus-resistenza");
    inputsCalcolo.forEach(elemento => {
        elemento.addEventListener("input", () => calcola(scheda));
        elemento.addEventListener("change", () => calcola(scheda));
    });

    // Se è impostato l'evento di eliminazione, lo colleghiamo al click sulla cella
    if (eliminabile) {
        const btnElimina = scheda.querySelector(".btn-elimina");
        btnElimina.addEventListener("click", () => {
            scheda.remove();
        });
    }

    // Inserisce la scheda ed esegue il primo calcolo iniziale di default
    griglia.appendChild(scheda);
    calcola(scheda);
}

// 1. Genera i 2 calcolatori fissi obbligatori all'avvio
creaCalcolatore(false);
creaCalcolatore(false);

// 2. Gestisce la creazione di nuovi calcolatori tramite il pulsante in alto
document.getElementById("aggiungiCalcolatore").addEventListener("click", () => {
    creaCalcolatore(true);
});
</script>

</body>
</html>
