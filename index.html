<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calcolatore Danni Multiplo</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#202020;
    display:flex;
    flex-direction: column;
    align-items:center;
    min-height:100vh;
    padding: 30px 10px;
}

/* Area dei controlli principali */
.controlli {
    margin-bottom: 30px;
    text-align: center;
}

.btn-aggiungi {
    background: #4caf50;
    color: white;
    border: none;
    padding: 12px 24px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: background 0.2s, transform 0.1s;
}

.btn-aggiungi:hover {
    background: #43a047;
}

.btn-aggiungi:active {
    transform: scale(0.98);
}

/* Griglia per contenere tutti i calcolatori */
.griglia-calcolatori {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    width: 100%;
    max-width: 1600px;
}

/* Singola scheda del calcolatore */
.container{
    width: 480px;
    background:#2e2e2e;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,.5);
    overflow:hidden;
    display: flex;
    flex-direction: column;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:2px solid #111;
    text-align:center;
    padding:15px;
}

/* Stile per l'area del nome giocatore */
.player-header {
    background: #1e1e1e;
    padding: 12px;
}

.player-input {
    width: 100%;
    background: transparent;
    border: none;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    color: #ffffff;
    outline: none;
}

.player-input::placeholder {
    color: #888888;
    font-style: italic;
    font-weight: normal;
}

th{
    font-size:24px;
}

.attacco{
    background:#d32f2f;
    color:white;
}

.resistenza{
    background:#fbc02d;
    color:black;
}

.input{
    background:#aed581;
}

input[type="number"] {
    width:100%;
    background:transparent;
    border:none;
    text-align:center;
    font-size:36px;
    font-weight:bold;
    outline:none;
}

.fascia{
    margin-top:10px;
    font-size:20px;
    font-weight:bold;
}

select{
    margin-top:10px;
    font-size:16px;
    padding:6px;
    border-radius:6px;
}

.dannoTitolo{
    background:#ffee58;
    color:black;
    font-size:22px;
}

.danno{
    background:#b71c1c;
    color:white;
    font-size:48px;
    font-weight:bold;
}

/* Pulsante per eliminare il singolo calcolatore */
.btn-elimina {
    background: #e53935;
    color: white;
    border: none;
    padding: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s;
    border-top: 2px solid #111;
}

.btn-elimina:hover {
    background: #b71c1c;
}

/* Colori delle fasce */
.bianca{color:white;}
.gialla{color:#ffee58;}
.arancione{color:orange;}
.rossa{color:#ff5252;}
.viola{color:#ba68c8;}
.nera{color:#9e9e9e;}
.bronzo{color:#b87333;}
.argento{color:silver;}
.oro{color:gold;}
.diamante{color:#64b5f6;}

</style>

</head>

<body>

<div class="controlli">
    <button class="btn-aggiungi" id="aggiungiCalcolatore">＋ Aggiungi Calcolatore</button>
</div>

<div class="griglia-calcolatori" id="contenitoreCalcolatori"></div>

<script>

// Funzione per calcolare la fascia numerica
function fascia(valore){
    if(valore<=29) return 1;
    if(valore<=59) return 2;
    if(valore<=89) return 3;
    if(valore<=119) return 4;
    if(valore<=149) return 5;
    if(valore==150) return 6;
    if(valore<=199) return 7;
    if(valore<=224) return 8;
    if(valore<=255) return 9;
    return 10;
}

// Restituisce il nome testuale della fascia
function nomeFascia(f){
    switch(f){
        case 1:return "Bianca";
        case 2:return "Gialla";
        case 3:return "Arancione";
        case 4:return "Rossa";
        case 5:return "Viola";
        case 6:return "Nera";
        case 7:return "Bronzo";
        case 8:return "Argento";
        case 9:return "Oro";
        default:return "Diamante";
    }
}

// Restituisce la classe CSS associata al colore della fascia
function classeFascia(f){
    switch(f){
        case 1:return "bianca";
        case 2:return "gialla";
        case 3:return "arancione";
        case 4:return "rossa";
        case 5:return "viola";
        case 6:return "nera";
        case 7:return "bronzo";
        case 8:return "argento";
        case 9:return "oro";
        default:return "diamante";
    }
}

// Esegue il calcolo isolato per una specifica scheda calcolatore
function calcola(scheda){
    const inputAttacco = scheda.querySelector(".attacco-input");
    const inputResistenza = scheda.querySelector(".resistenza-input");
    const selectMalusAttacco = scheda.querySelector(".malus-attacco-select");
    const selectMalusResistenza = scheda.querySelector(".malus-resistenza-select");

    const valoreAttacco = Number(inputAttacco.value) || 0;
    const valoreResistenza = Number(inputResistenza.value) || 0;

    let fasciaAttacco = fascia(valoreAttacco);
    let fasciaResistenza = fascia(valoreResistenza);

    fasciaAttacco -= Number(selectMalusAttacco.value);
    fasciaResistenza -= Number(selectMalusResistenza.value);

    if(fasciaAttacco < 1) fasciaAttacco = 1;
    if(fasciaResistenza < 1) fasciaResistenza = 1;

    const testoAttacco = scheda.querySelector(".fascia-attacco-testo");
    const testoResistenza = scheda.querySelector(".fascia-resistenza-testo");

    testoAttacco.textContent = nomeFascia(fasciaAttacco);
    testoResistenza.textContent = nomeFascia(fasciaResistenza);

    testoAttacco.className = "fascia " + classeFascia(fasciaAttacco);
    testoResistenza.className = "fascia " + classeFascia(fasciaResistenza);

    letActive = fasciaAttacco - fasciaResistenza;
    let differenza = fasciaAttacco - fasciaResistenza;

    if(differenza < 0)
        differenza = 0;

    scheda.querySelector(".danno-testo").textContent = differenza * 10;
}

// Funzione principale per creare un calcolatore (scheda)
function creaCalcolatore(eliminabile) {
    const contenitore = document.getElementById("contenitoreCalcolatori");
    
    // Creazione del div principale della scheda
    const scheda = document.createElement("div");
    scheda.className = "container";
    
    // HTML interno con classi al posto di ID univoci e l'aggiunta del campo "nome player"
    scheda.innerHTML = `
        <table>
            <tr>
                <td colspan="2" class="player-header">
                    <input type="text" class="player-input" placeholder="Inserire nome player">
                </td>
            </tr>
            <tr>
                <th class="attacco">ATTACCO</th>
                <th class="resistenza">RESISTENZA</th>
            </tr>
            <tr>
                <td class="input">
                    <input class="attacco-input" type="number" value="120" step="5">
                    <div class="fascia fascia-attacco-testo"></div>
                    <select class="malus-attacco-select">
                        <option value="0">0</option>
                        <option value="1">-1</option>
                        <option value="2">-2</option>
                        <option value="3">-3</option>
                    </select>
                </td>
                <td class="input">
                    <input class="resistenza-input" type="number" value="90" step="5">
                    <div class="fascia fascia-resistenza-testo"></div>
                    <select class="malus-resistenza-select">
                        <option value="0">0</option>
                        <option value="1">-1</option>
                        <option value="2">-2</option>
                        <option value="3">-3</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td class="dannoTitolo">DANNO MASSIMO</td>
                <td class="danno">
                    <span class="danno-testo">0</span>
                </td>
            </tr>
        </table>
    `;

    // Se è impostato come eliminabile, aggiunge il pulsante di cancellazione
    if (eliminabile) {
        const btnElimina = document.createElement("button");
        btnElimina.className = "btn-elimina";
        btnElimina.textContent = "Elimina Calcolatore";
        btnElimina.onclick = function() {
            scheda.remove();
        };
        scheda.appendChild(btnElimina);
    }

    // Aggiunge i listener per calcolare in tempo reale quando cambiano i dati (escludendo il nome player che non influisce sul calcolo)
    const inputsCalcolo = scheda.querySelectorAll("input[type='number'], select");
    inputsCalcolo.forEach(elemento => {
        elemento.addEventListener("input", () => calcola(scheda));
        elemento.addEventListener("change", () => calcola(scheda));
    });

    // Inserisce la scheda nella griglia ed esegue il primo calcolo
    contenitore.appendChild(scheda);
    calcola(scheda);
}

// Genera i due calcolatori di default non eliminabili
creaCalcolatore(false);
creaCalcolatore(false);

// Gestione del click sul pulsante per aggiungere nuovi calcolatori
document.getElementById("aggiungiCalcolatore").addEventListener("click", () => {
    creaCalcolatore(true);
});

</script>

</body>
</html>
